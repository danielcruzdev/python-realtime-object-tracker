name: Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies (OpenCV headless)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless>=4.8.0
          pip install ultralytics>=8.0.0 numpy>=1.24.0 scipy>=1.10.0 filterpy>=1.4.5

      - name: Verify imports
        run: |
          python - <<'EOF'
          import cv2
          import numpy as np
          import scipy
          import filterpy
          from ultralytics import YOLO
          from tracker.sort import Sort
          print("All imports successful")
          EOF

      - name: Lint with Ruff (non-blocking)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check . --output-format=github
